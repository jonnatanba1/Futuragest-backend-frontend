<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FuturaGest - Menú Principal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#f9f9fc",
                        "outline": "#6e7a74",
                        "on-tertiary-fixed": "#001e2d",
                        "on-background": "#1a1c1e",
                        "error": "#ba1a1a",
                        "on-primary-container": "#a4ffdd",
                        "on-primary": "#ffffff",
                        "on-primary-fixed-variant": "#00513d",
                        "surface-container-highest": "#e2e2e5",
                        "on-tertiary-fixed-variant": "#004c6b",
                        "surface-container": "#eeeef0",
                        "tertiary-fixed": "#c6e7ff",
                        "inverse-on-surface": "#f0f0f3",
                        "primary-fixed-dim": "#79d8b7",
                        "tertiary-fixed-dim": "#81cfff",
                        "on-error-container": "#93000a",
                        "primary-fixed": "#95f5d2",
                        "on-secondary-container": "#613100",
                        "secondary-fixed-dim": "#ffb77f",
                        "surface-container-low": "#f3f3f6",
                        "on-secondary": "#ffffff",
                        "surface-dim": "#dadadc",
                        "surface-container-lowest": "#ffffff",
                        "error-container": "#ffdad6",
                        "surface-container-high": "#e8e8ea",
                        "on-primary-fixed": "#002117",
                        "on-tertiary": "#ffffff",
                        "tertiary-container": "#00739f",
                        "primary": "#005f48",
                        "inverse-surface": "#2f3133",
                        "secondary-fixed": "#ffdcc4",
                        "on-surface": "#1a1c1e",
                        "on-surface-variant": "#3e4944",
                        "primary-container": "#007a5e",
                        "outline-variant": "#bdc9c2",
                        "tertiary": "#00597d",
                        "surface-variant": "#e2e2e5",
                        "on-secondary-fixed-variant": "#6f3900",
                        "on-tertiary-container": "#ddf0ff",
                        "on-secondary-fixed": "#2f1500",
                        "surface-bright": "#f9f9fc",
                        "surface": "#f9f9fc",
                        "secondary-container": "#ff8a00",
                        "secondary": "#914c00",
                        "inverse-primary": "#79d8b7",
                        "on-error": "#ffffff",
                        "surface-tint": "#006c53"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "1rem",
                        "2xl": "1.5rem",
                        "3xl": "2rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-gap": "20px",
                        "inline-gap": "16px",
                        "section-margin": "40px",
                        "unit": "4px",
                        "container-padding": "24px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Manrope"],
                        "body-lg": ["Manrope"],
                        "title-lg": ["Manrope"],
                        "display-lg": ["Manrope"],
                        "headline-lg-mobile": ["Manrope"],
                        "body-md": ["Manrope"],
                        "headline-md": ["Manrope"],
                        "label-lg": ["Manrope"]
                    },
                    "fontSize": {
                        "headline-lg": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "title-lg": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "display-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "letterSpacing": "-0.01em", "fontWeight": "800" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "700" }],
                        "label-lg": ["12px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
        
        .fluid-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05), inset 0 0 0 1px rgba(255, 255, 255, 0.4);
        }
        
        .fluid-bg-gradient {
            background: linear-gradient(135deg, #f0fdf4 0%, #e0f2fe 50%, #fff7ed 100%);
        }
        
        .blob-1 {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(121, 216, 183, 0.2) 0%, rgba(121, 216, 183, 0) 70%);
            border-radius: 50%;
            filter: blur(40px);
            z-index: -1;
        }
        
        .blob-2 {
            position: absolute;
            bottom: -10%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 138, 0, 0.15) 0%, rgba(255, 138, 0, 0) 70%);
            border-radius: 50%;
            filter: blur(60px);
            z-index: -1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="fluid-bg-gradient text-on-background min-h-screen pb-32 pt-20 relative overflow-x-hidden">
<div class="blob-1"></div>
<div class="blob-2"></div>
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 fluid-card flex justify-between items-center px-container-padding h-20 transition-all duration-300">
<button class="flex items-center justify-center p-2 rounded-full bg-white/50 hover:bg-white/80 shadow-sm backdrop-blur-md transition-all active:scale-95 text-primary">
<span class="material-symbols-outlined" data-icon="bubble_chart" data-weight="fill" style="font-variation-settings: 'FILL' 1;">bubble_chart</span>
</button>
<div class="font-display-lg text-[28px] leading-[36px] font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-primary to-tertiary tracking-tight">
            FuturaGest
        </div>
<button class="flex items-center justify-center p-2 rounded-full bg-white/50 hover:bg-white/80 shadow-sm backdrop-blur-md transition-all active:scale-95 text-primary relative">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
<span class="absolute top-2 right-2 w-2 h-2 bg-error rounded-full"></span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="px-container-padding max-w-lg mx-auto relative z-10">
<!-- Welcome Section -->
<section class="mt-8 mb-10">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-background mb-3">¡Hola, Administrador! <span class="inline-block animate-bounce origin-bottom-right">👋</span></h1>
<p class="font-body-lg text-body-lg text-on-surface-variant font-medium">¿Qué necesitas gestionar hoy?</p>
</section>
<!-- Main Actions Grid -->
<div class="grid grid-cols-1 gap-6">
<!-- Asistencia Card -->
<button class="fluid-card rounded-3xl p-6 flex items-center gap-5 hover:-translate-y-1 hover:shadow-[0_12px_40px_rgba(0,95,72,0.12)] transition-all duration-300 active:scale-95 w-full text-left group">
<div class="w-16 h-16 shrink-0 rounded-2xl bg-gradient-to-br from-primary to-primary-container text-white flex items-center justify-center shadow-[0_8px_16px_rgba(0,95,72,0.25)] group-hover:scale-110 transition-transform duration-300">
<span class="material-symbols-outlined text-[32px]" data-icon="event_available">event_available</span>
</div>
<div class="flex-1">
<h2 class="font-headline-md text-headline-md text-on-background mb-1">Asistencia</h2>
<p class="font-body-md text-body-md text-on-surface-variant line-clamp-2">Registro y control de presentismo diario.</p>
</div>
<div class="w-8 h-8 rounded-full bg-surface-container-highest/50 flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-white transition-colors">
<span class="material-symbols-outlined text-sm" data-icon="arrow_forward_ios">arrow_forward_ios</span>
</div>
</button>
<!-- Novedades Card -->
<button class="fluid-card rounded-3xl p-6 flex items-center gap-5 hover:-translate-y-1 hover:shadow-[0_12px_40px_rgba(0,115,159,0.12)] transition-all duration-300 active:scale-95 w-full text-left group">
<div class="w-16 h-16 shrink-0 rounded-2xl bg-gradient-to-br from-tertiary-container to-tertiary text-white flex items-center justify-center shadow-[0_8px_16px_rgba(0,115,159,0.25)] group-hover:scale-110 transition-transform duration-300">
<span class="material-symbols-outlined text-[32px]" data-icon="new_releases">new_releases</span>
</div>
<div class="flex-1">
<h2 class="font-headline-md text-headline-md text-on-background mb-1">Novedades</h2>
<p class="font-body-md text-body-md text-on-surface-variant line-clamp-2">Gestión de licencias, permisos y avisos.</p>
</div>
<div class="w-8 h-8 rounded-full bg-surface-container-highest/50 flex items-center justify-center text-tertiary-container group-hover:bg-tertiary-container group-hover:text-white transition-colors">
<span class="material-symbols-outlined text-sm" data-icon="arrow_forward_ios">arrow_forward_ios</span>
</div>
</button>
<!-- Justificaciones Card -->
<button class="fluid-card rounded-3xl p-6 flex items-center gap-5 hover:-translate-y-1 hover:shadow-[0_12px_40px_rgba(255,138,0,0.12)] transition-all duration-300 active:scale-95 w-full text-left group">
<div class="w-16 h-16 shrink-0 rounded-2xl bg-gradient-to-br from-secondary-container to-secondary text-white flex items-center justify-center shadow-[0_8px_16px_rgba(255,138,0,0.25)] group-hover:scale-110 transition-transform duration-300">
<span class="material-symbols-outlined text-[32px]" data-icon="fact_check">fact_check</span>
</div>
<div class="flex-1">
<h2 class="font-headline-md text-headline-md text-on-background mb-1">Justificaciones</h2>
<p class="font-body-md text-body-md text-on-surface-variant line-clamp-2">Revisión y aprobación de inasistencias.</p>
</div>
<div class="w-8 h-8 rounded-full bg-surface-container-highest/50 flex items-center justify-center text-secondary-container group-hover:bg-secondary-container group-hover:text-white transition-colors">
<span class="material-symbols-outlined text-sm" data-icon="arrow_forward_ios">arrow_forward_ios</span>
</div>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="md:hidden fluid-card font-label-lg text-label-lg fixed bottom-6 left-6 right-6 rounded-[2rem] z-50 flex justify-around items-center h-20 px-2">
<button class="flex flex-col items-center justify-center bg-primary/10 text-primary rounded-2xl px-6 py-2 transition-all duration-300 active:scale-90">
<span class="material-symbols-outlined mb-1" data-icon="home_work" data-weight="fill" style="font-variation-settings: 'FILL' 1;">home_work</span>
<span>Home</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-6 py-2 hover:bg-black/5 rounded-2xl active:scale-90 transition-all">
<span class="material-symbols-outlined mb-1" data-icon="notifications">notifications</span>
<span>Alerts</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-6 py-2 hover:bg-black/5 rounded-2xl active:scale-90 transition-all">
<span class="material-symbols-outlined mb-1" data-icon="settings">settings</span>
<span>Settings</span>
</button>
</nav>
</body></html>
