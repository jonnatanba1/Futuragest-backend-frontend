server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --- Security headers (web.dev/security) ---------------------------------
    # These are declared once at the server level. IMPORTANT: do NOT add any
    # `add_header` inside the location blocks below — in nginx an add_header in a
    # child block REPLACES all inherited ones, which would silently strip these
    # headers (notably the CSP on index.html). Per-location caching therefore uses
    # the `expires` directive, which does not reset header inheritance.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    # HSTS — enable once served over HTTPS (TLS terminated here or upstream).
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Content Security Policy.
    # ${API_ORIGIN} is injected at container start by nginx's envsubst template
    # mechanism (see Dockerfile). It MUST list the backend origin the SPA calls;
    # override per environment via the API_ORIGIN env var. 'unsafe-inline' for
    # style-src covers React/Mantine inline style attributes; scripts stay strict.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://translate.googleapis.com; style-src 'self' 'unsafe-inline' https://www.gstatic.com https://translate.googleapis.com; img-src 'self' data: blob: https://www.gstatic.com; font-src 'self' data:; connect-src 'self' ${API_ORIGIN} https://translate.googleapis.com; object-src 'none'; base-uri 'none'; frame-ancestors 'self'; form-action 'self'" always;

    # --- Caching (via `expires` so security headers keep inheriting) ----------
    # Vite emits content-hashed asset filenames — safe to cache long-term.
    location /assets/ {
        expires 1y;
        try_files $uri =404;
    }

    # index.html must never be cached so new deploys are picked up immediately.
    location = /index.html {
        expires -1;
    }

    # Runtime config consumed by the SPA (window.__APP_CONFIG__.apiBaseUrl).
    # ${API_ORIGIN} is substituted at container start — the SAME var as the CSP
    # connect-src above — so repointing the backend is a one-env-var change with
    # no image rebuild. Served dynamically here, shadowing any static dist/config.js.
    # `expires -1` (no add_header, per the inheritance note above) keeps it uncached
    # so an env change / redeploy is picked up on the next load.
    location = /config.js {
        default_type application/javascript;
        expires -1;
        return 200 "window.__APP_CONFIG__={apiBaseUrl:\"${API_ORIGIN}\"};";
    }

    # --- SPA routing ----------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
